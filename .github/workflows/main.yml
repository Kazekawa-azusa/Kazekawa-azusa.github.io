name: Generate Projects JSON

on:
  push:
    branches: [ main ] # 或者是你的預設分支名稱

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許 Action 推送檔案回 Repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run generation script
        run: python generate_projects.py

      - name: Commit and Push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add all_projects.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update all_projects.json" && git push)